<html>

  <style>
    * {
      margin: 0px;
      padding: 0px;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      margin: 0px;
      padding: 0px;
      background-image: url(Anuj.jpg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed
    }

    /*Contact*/
    .contact {
      padding: 50px 20px;
      text-align: center;
    }

    .contact h2 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .contact p {
      margin-bottom: 30px;
      color: gray;
    }

    .contact-box {
      max-width: 350px;
      height: auto;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    form input,
    form select,
    form textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 10px;
    }

    label {
      font-size: 10px;
      float: left;
    }

    form textarea {
      height: 80px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #007BFF;
      color: white;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    /*navbar*/
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0077ff;
      padding: 15px 20px;
      position: fixed;
      width: 100%;
    }

    .logo {
      color: rgb(245, 3, 3);
      font-size: 45px;
      font-weight: bold;
      text-shadow: 2px 2px 5px rgb(173, 25, 28);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 40px;
    }

    .nav-links a {
      text-decoration: none;
      color: rgb(237, 230, 230);
      font-size: 30px;
      padding: 10px 35px;
    }

    .menu-icon {
      display: none;
      font-size: 28px;
      color: white;
      padding: 10px 20px;
      cursor: pointer;
    }

    nav ul li a:hover {
      color: red;
    }

    /*Contact
         .Contact h1{
          text-align: center;
          color: rgb(63, 18, 243);
          padding: 100px 0px 10px 0px;
          text-shadow: 2px 2px 5px rgb(10, 10, 10);
         }*/
    .Contact h1 {
      display: block;
      font-size: 2em;
      color: rgb(82, 38, 227);
      margin-block-start: 0px;
      margin-block-end: 25px;
      margin-inline-start: 0px;
      margin-inline-end: 0px;
      font-weight: bold;
      unicode-bidi: isolate;
      text-shadow: 2px 2px 5px rgb(10, 10, 10);
    }

    .Contact p {
      text-align: center;
      font-size: 20px;
      color: black;
      padding: 1px;
    }

    .contact h3 {
      padding: 0px 0px 25px 0px;
      font-size: 30px;
      color: red;
      text-shadow: 2px 2px 5px rgb(201, 23, 23);
    }

    footer {
      background-color: #222;
      color: white;
      text-align: center;
      padding: 15px;
      position: relative;
      bottom: 0;
      width: 100%;
    }

    /* Mobile */
    @media(max-width:768px) {
      .nav-links {
        display: none;
        flex-direction: column;
        background: #0077ff;
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        text-align: center;
      }

      .nav-links.show {
        display: flex;
      }

      .menu-icon {
        display: block;
      }

      .contact h2 {
        font-size: 20px;
      }

      .contact-box {
        padding: 15px;
      }
    }
  </style>
</head>
